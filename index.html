<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的链接收藏</title>
<style>
body { max-width: 800px; margin: 30px auto; padding: 0 20px; font-family: Microsoft YaHei, sans-serif; }
.search-box { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; }
.link-item { padding: 12px 15px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 10px; }
.link-item a { color: #0066cc; text-decoration: none; font-size: 16px; }
.link-item span { color: #666; margin-left: 10px; }
</style>
</head>

<body>
<h1>我的链接收藏</h1>
<input type="text" class="search-box" id="search" placeholder="搜索关键词..." oninput="search()">

<div id="list">
  <!-- 👇 你只需要在这里加链接和备注 👇 -->

  <div class="link-item">
    <a href="https://www.baidu.com" target="_blank">百度</a>
    <span>百度搜索入口</span>
  </div>

  <div class="link-item">
    <a href="https://github.com" target="_blank">GitHub</a>
    <span>代码托管平台</span>
  </div>

  <div class="link-item">
    <a href="https://vercel.com" target="_blank">Vercel</a>
    <span>免费部署网站</span>
  </div>

  <!-- 👆 上面是示例，你可以无限加 👆 -->
</div>

<script>
function search() {
  let s = document.getElementById('search').value.toLowerCase();
  let items = document.querySelectorAll('.link-item');
  items.forEach(i => {
    i.style.display = i.innerText.toLowerCase().includes(s) ? 'block' : 'none';
  });
}
</script>
</body>
</html>
