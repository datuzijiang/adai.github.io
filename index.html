<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的全球可访问网站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="max-w-4xl mx-auto p-4">
    <h1 class="text-3xl font-bold mb-6">我的专属网站</h1>

    <!-- 搜索框 -->
    <div class="mb-6">
        <input type="text" id="search-input" placeholder="输入关键词搜索内容..." 
               class="w-full p-2 border border-gray-300 rounded">
        <button onclick="searchContent()" class="mt-2 p-2 bg-blue-500 text-white rounded">搜索</button>
    </div>

    <!-- 内容上传表单 -->
    <div class="border p-4 rounded mb-6">
        <h2 class="text-xl font-semibold mb-3">上传新内容</h2>
        <div class="mb-2">
            <label>标题：</label>
            <input type="text" id="content-title" class="w-full p-2 border border-gray-300 rounded" placeholder="输入标题">
        </div>
        <div class="mb-2">
            <label>链接：</label>
            <input type="url" id="content-link" class="w-full p-2 border border-gray-300 rounded" placeholder="输入链接（可选）">
        </div>
        <div class="mb-2">
            <label>图片：</label>
            <input type="file" id="content-image" accept="image/*" class="w-full p-2">
        </div>
        <button onclick="uploadContent()" class="p-2 bg-green-500 text-white rounded">上传内容</button>
    </div>

    <!-- 内容展示区 -->
    <div id="content-list" class="space-y-4">
        <!-- 内容会动态加载 -->
    </div>

    <script>
        // 👇 替换成你自己的 GitHub 信息！👇
        const GITHUB_CONFIG = {
            owner: "adai", // 比如 testuser
            repo: "阿呆", // 比如 testuser.github.io
            token: "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", // 后续步骤会教你生成
            contentPath: "content/",
            imagePath: "assets/"
        };

        // 页面加载时加载所有内容
        window.onload = loadAllContent;

        // 1. 加载所有内容
        async function loadAllContent() {
            try {
                // 先创建content和assets目录（如果不存在）
                await createDirIfNotExist(GITHUB_CONFIG.contentPath);
                await createDirIfNotExist(GITHUB_CONFIG.imagePath);

                const res = await axios.get(
                    `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.contentPath}`,
                    { headers: { Authorization: `token ${GITHUB_CONFIG.token}` } }
                );

                const contentList = document.getElementById("content-list");
                contentList.innerHTML = "";

                for (const file of res.data) {
                    if (file.name.endsWith(".json")) {
                        const contentRes = await axios.get(file.download_url);
                        const content = contentRes.data;
                        contentList.innerHTML += `
                            <div class="border p-3 rounded">
                                <h3 class="text-lg font-semibold">${content.title}</h3>
                                ${content.imageUrl ? `<img src="${content.imageUrl}" class="my-2 max-w-xs rounded" alt="图片">` : ""}
                                ${content.link ? `<a href="${content.link}" target="_blank" class="text-blue-500">访问链接</a>` : ""}
                                <p class="text-gray-600 text-sm mt-1">发布时间：${content.createTime}</p>
                            </div>
                        `;
                    }
                }
            } catch (err) {
                alert("加载内容失败：" + err.message);
                console.error(err);
            }
        }

        // 2. 搜索功能
        function searchContent() {
            const keyword = document.getElementById("search-input").value.trim().toLowerCase();
            const allItems = document.querySelectorAll("#content-list > div");
            allItems.forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = keyword === "" || text.includes(keyword) ? "block" : "none";
            });
        }

        // 3. 上传内容
        async function uploadContent() {
            const title = document.getElementById("content-title").value.trim();
            const link = document.getElementById("content-link").value.trim();
            const imageFile = document.getElementById("content-image").files[0];

            if (!title) {
                alert("标题不能为空！");
                return;
            }

            try {
                let imageUrl = "";
                if (imageFile) {
                    const reader = new FileReader();
                    reader.readAsDataURL(imageFile);
                    reader.onload = async function() {
                        const base64Data = this.result.split(",")[1];
                        const imageRes = await axios.put(
                            `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.imagePath}${Date.now()}-${imageFile.name}`,
                            { message: `上传图片: ${imageFile.name}`, content: base64Data },
                            { headers: { Authorization: `token ${GITHUB_CONFIG.token}` } }
                        );
                        imageUrl = imageRes.data.content.download_url;
                        await uploadContentJSON(title, link, imageUrl);
                    };
                } else {
                    await uploadContentJSON(title, link, imageUrl);
                }
            } catch (err) {
                alert("上传失败：" + err.message);
                console.error(err);
            }
        }

        // 辅助：上传JSON文件
        async function uploadContentJSON(title, link, imageUrl) {
            const contentData = {
                title: title,
                link: link,
                imageUrl: imageUrl,
                createTime: new Date().toLocaleString()
            };
            const contentJson = JSON.stringify(contentData, null, 2);
            const base64Content = btoa(unescape(encodeURIComponent(contentJson)));

            await axios.put(
                `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.contentPath}${Date.now()}.json`,
                { message: `添加内容: ${title}`, content: base64Content },
                { headers: { Authorization: `token ${GITHUB_CONFIG.token}` } }
            );

            alert("上传成功！");
            loadAllContent();
            // 清空表单
            document.getElementById("content-title").value = "";
            document.getElementById("content-link").value = "";
            document.getElementById("content-image").value = "";
        }

        // 辅助：创建目录（如果不存在）
        async function createDirIfNotExist(dirPath) {
            try {
                await axios.get(
                    `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${dirPath}`,
                    { headers: { Authorization: `token ${GITHUB_CONFIG.token}` } }
                );
            } catch (err) {
                if (err.response.status === 404) {
                    await axios.put(
                        `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${dirPath}.gitkeep`,
                        { message: `创建目录: ${dirPath}`, content: btoa("") },
                        { headers: { Authorization: `token ${GITHUB_CONFIG.token}` } }
                    );
                }
            }
        }
    </script>
</body>
</html>
